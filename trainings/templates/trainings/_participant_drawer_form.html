<h2 style="margin:0 0 10px 0; font-size:18px; font-weight:950;">➕ Ajouter un participant</h2>
<div style="opacity:.7; font-size:13px; margin-bottom:12px;">
  Session : <strong>{{ session.reference }}</strong> — {{ session.start_date|date:"d/m/Y" }}
</div>

<form method="post" action="{% url 'session_participant_add' session.id %}">
  {% csrf_token %}

  <input type="hidden" name="force_prerequisite" id="forcePrerequisiteInput" value="">

  <div style="display:grid; gap:10px;">
    {{ p_form.as_p }}

    <!-- Pré-requis -->
    <div id="prereqBox" style="
      display:none;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.20);
      font-weight:900;
      font-size:13px;
    ">
      <span id="prereqIcon" style="margin-right:8px;">ℹ️</span>
      <span id="prereqMsg">Vérification du pré-requis…</span>
    </div>
  </div>

  <div style="display:flex; flex-direction:column; gap:10px; margin-top:14px;">
    <button id="saveBtn" type="submit" style="
      width:100%;
      padding:10px 14px; border-radius:12px;
      border:1px solid rgba(124,58,237,0.45);
      background: rgba(124,58,237,0.18);
      color:white; font-weight:900; cursor:pointer;">
      Enregistrer
    </button>

    <button id="forceBtn" type="submit" style="
      display:none;
      width:100%;
      padding:10px 14px; border-radius:12px;
      border:1px solid rgba(245,158,11,0.45);
      background: rgba(245,158,11,0.18);
      color:white; font-weight:900; cursor:pointer;">
      Forcer l’inscription
    </button>

    <button type="button" onclick="closeDrawer()" style="
      width:100%;
      padding:10px 14px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color:white; font-weight:900; cursor:pointer;">
      Fermer
    </button>
  </div>
</form>

<script>
(function(){
  function setPrereqUI(show, ok, message){
    var box = document.getElementById('prereqBox');
    var icon = document.getElementById('prereqIcon');
    var msg  = document.getElementById('prereqMsg');
    var saveBtn  = document.getElementById('saveBtn');
    var forceBtn = document.getElementById('forceBtn');
    var forceInput = document.getElementById('forcePrerequisiteInput');

    if(!box || !icon || !msg || !saveBtn || !forceBtn || !forceInput) return;

    box.style.display = show ? '' : 'none';

    if(!show){
      saveBtn.disabled = false;
      saveBtn.style.opacity = '1';
      saveBtn.style.cursor = 'pointer';

      forceBtn.style.display = 'none';
      forceInput.value = '';
      return;
    }

    msg.textContent = message || '';

    if(ok){
      icon.textContent = '✅';
      box.style.borderColor = 'rgba(34,197,94,0.40)';
      box.style.background  = 'rgba(34,197,94,0.10)';

      saveBtn.disabled = false;
      saveBtn.style.opacity = '1';
      saveBtn.style.cursor = 'pointer';

      forceBtn.style.display = 'none';
      forceInput.value = '';
    }else{
      icon.textContent = '⛔';
      box.style.borderColor = 'rgba(239,68,68,0.40)';
      box.style.background  = 'rgba(239,68,68,0.12)';

      saveBtn.disabled = true;
      saveBtn.style.opacity = '.55';
      saveBtn.style.cursor = 'not-allowed';

      forceBtn.style.display = 'inline-flex';
    }
  }

  var emailInput =
      document.querySelector('#id_email') ||
      document.querySelector('input[name="email"]') ||
      document.querySelector('input[type="email"]');

  if(!emailInput) return;

  var forceBtn = document.getElementById('forceBtn');
  var forceInput = document.getElementById('forcePrerequisiteInput');
  var sessionId = "{{ session.id }}";

  var timer = null;

  if(forceBtn && forceInput){
    forceBtn.addEventListener('click', function(){
      forceInput.value = '1';
    });
  }

  function check(){
    var email = (emailInput.value || "").trim();

    if(forceInput){
      forceInput.value = '';
    }

    // Tant que l'email est vide : on masque l'alerte et le bouton forcer
    if(!email){
      setPrereqUI(false, true, "");
      return;
    }

    setPrereqUI(true, false, "Vérification du pré-requis Initiation…");

    var url = "{% url 'trainings:api_prereq_initiation' %}" +
      "?session_id=" + encodeURIComponent(sessionId) +
      "&email=" + encodeURIComponent(email);

    fetch(url, {headers: {"X-Requested-With":"XMLHttpRequest"}})
      .then(r => r.json())
      .then(data => {
        if(!data || data.needs_prereq === false){
          setPrereqUI(false, true, "");
          return;
        }

        setPrereqUI(
          true,
          !!data.ok,
          data.message || (data.ok ? "✅ Pré-requis validé." : "⛔ Initiation requise.")
        );
      })
      .catch(() => {
        setPrereqUI(true, false, "Erreur de vérification. Impossible d’inscrire sans validation.");
      });
  }

  emailInput.addEventListener('input', function(){
    clearTimeout(timer);
    timer = setTimeout(check, 300);
  });

  setTimeout(check, 50);
})();
</script>
